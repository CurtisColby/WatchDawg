services:
  watchdawg:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: watchdawg-backend
    restart: unless-stopped
    ports:
      - "${APP_PORT:-6868}:6868"
    env_file:
      - .env
    devices:
      # Pass Intel GPU into container for QuickSync hardware transcoding
      - /dev/dri:/dev/dri
    group_add:
      # Give container permission to use the GPU render device
      - video
    volumes:
      # SOURCE CODE — live-mounted so deploys are just file copy + restart.
      # The image bakes in a copy of app/ as fallback, but this mount
      # takes precedence at runtime. Edit files in ~/watchdawg-backend/app/
      # and restart the container — no docker cp, no rebuild needed.
      - ./app:/app/app

      # Persistent database storage
      - ./data:/app/data

      # Browser cookies for yt-dlp (read-only inside container)
      - ./config/cookies.txt:/config/cookies.txt

      # Reddit session cookies for the Reddit provider (read-only inside
      # container). Exported from a logged-in browser in MozillaCookieJar
      # format — same routine as the YouTube cookies above. Re-export to
      # this host file when Reddit rotates the session; the provider
      # re-reads it on every scrape run, no restart needed.
      - ./config/reddit_cookies.txt:/config/reddit_cookies.txt

      # Downloads root — contains Public/ and Private/ subfolders.
      # Host folder: /media/colby/NAS1/WD_Downloads
      # Internal container path: /watchdawg
      # Public/  — unlocked source downloads, visible without PIN
      # Private/ — locked source downloads, visible only with PIN (Library tab)
      - /media/colby/NAS1/WD_Downloads:/watchdawg
    environment:
      - TZ=${TIMEZONE:-America/Chicago}
      # Tell FFmpeg and VA-API where the Intel iHD driver lives inside the container
      - LIBVA_DRIVER_NAME=iHD
      - LIBVA_DRIVERS_PATH=/usr/lib/x86_64-linux-gnu/dri
      # Explicitly pass TMDb API key — env_file alone doesn't guarantee
      # all keys reach the container when an environment: block also exists.
      - TMDB_API_KEY=${TMDB_API_KEY}
      # LAN address Android TV uses to reach the backend.
      # Used by epg.py to build manifest.mpd URLs that the TV can actually reach.
      # Change this if your PlexServer IP changes.
      - WATCHDAWG_BASE_URL=http://192.168.50.42:6868
